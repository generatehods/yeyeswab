<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YEYESWAB</title>

  <style>
    body { 
      margin: 0;
      padding: 0;
      font-family: "Inter", sans-serif;
      background: #0a0f1f;
      color: #fff;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: #0d1328;
      border-bottom: 1px solid #1e2645;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-img {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }

    .brand-name {
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 1px;
    }

    .container {
      width: 100%;
      max-width: 440px;
      margin: 20px auto;
      padding: 0 10px;
      box-sizing: border-box;
    }

    /* Styling untuk Terminal Jupiter agar memenuhi layar mobile */
    #integrated-terminal {
      width: 100%;
      height: 600px;
      border-radius: 16px;
      overflow: hidden;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="logo-container">
      <img src="https://raw.githubusercontent.com/generatehods/yeyeswab/main/20251116_124325.png" alt="Logo" class="logo-img">
      <span class="brand-name">YEYESWAB</span>
    </div>
  </div>

  <div class="container">
    <!-- Jupiter Terminal langsung tampil di sini -->
    <div id="integrated-terminal"></div>
  </div>

  <script src="https://terminal.jup.ag/main-v3.js"></script>

  <script>
    window.Jupiter.init({
      displayMode: "integrated",
      integratedTargetId: "integrated-terminal",
      endpoint: "https://api.mainnet-beta.solana.com", // Disarankan pakai RPC pribadi (Helius/Quicknode)
      template: "Pro",
      
      // PENGATURAN FEE (UANG MASUK)
      platformFeeBps: 20, // 20 Bps = 0.2% dari setiap transaksi swap
      feeAccounts: new Map([
        // GANTI ALAMAT DI BAWAH DENGAN WALLET SOLANA ANDA
        ["So11111111111111111111111111111111111111112", "ALAMAT_WALLET_ANDA_DI_SINI"]
      ]),

      formProps: {
        initialInputMint: "So11111111111111111111111111111111111111112", // Default SOL
        initialOutputMint: "EPjFW3F2Tzq25165QGbbVeyJBeRxMpD1rk15M81NvnYm", // Default USDC
      },
    });
  </script>

</body>
</html>
