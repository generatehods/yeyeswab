<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YEYESWAB</title>

  <!-- Library Penting untuk Solana & Buffer -->
  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>

  <style>
    body { 
      margin: 0;
      padding: 0;
      font-family: "Inter", sans-serif;
      background: #0a0f1f;
      color: #fff;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: #0d1328;
      box-shadow: 0 1px 10px rgba(0,0,0,0.7);
    }

    .connect-btn {
      padding: 10px 16px;
      background: #2d6bff;
      border: none;
      font-size: 15px;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }

    .logo-right {
      width: 35px;
      height: 35px;
      object-fit: contain;
    }

    .container {
      max-width: 420px;
      margin: 40px auto;
      padding: 0 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Styling untuk Jupiter Terminal agar rapi */
    #integrated-terminal {
      width: 100%;
      height: 600px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #1e2645;
      margin-top: 20px;
    }

    .swap-card {
      width: 100%;
      background: #11172f;
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
      border: 1px solid #1e2645;
    }

    .token-box {
      background: #0d1328;
      padding: 15px;
      border-radius: 15px;
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    .amount-input {
      background: transparent;
      border: none;
      color: white;
      font-size: 20px;
      width: 100%;
      text-align: right;
      outline: none;
    }

    .swap-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #2d6bff, #5f89ff);
      border: none;
      border-radius: 14px;
      font-size: 18px;
      color: white;
      cursor: pointer;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <div class="header">
    <button class="connect-btn" id="connectWalletBtn">Connect Wallet</button>
    <img src="https://raw.githubusercontent.com/generatehods/yeyeswab/main/20251116_124325.png" alt="Logo" class="logo-right">
  </div>

  <div class="container">
    <!-- UI SWAP LOKAL ANDA -->
    <div class="swap-card">
      <div class="token-box">
        <span>Pay SOL</span>
        <input type="number" id="payAmount" class="amount-input" placeholder="0.0">
      </div>
      
      <!-- Tombol ini sekarang memanggil fungsi di api.js -->
      <button class="swap-btn" onclick="processSwap()">Swap via Yeyeswab</button>
    </div>

    <hr style="width: 100%; border: 0.5px solid #1e2645; margin: 30px 0;">
    <p style="font-size: 12px; opacity: 0.6;">Atau gunakan Jupiter Terminal Pro:</p>

    <!-- TEMPAT JUPITER TERMINAL MUNCUL -->
    <div id="integrated-terminal"></div>
  </div>

  <!-- SCRIPT LOGIKA -->
  <script src="api.js"></script>
  <script src="https://terminal.jup.ag/main-v3.js"></script>

  <script>
    // Inisialisasi Jupiter Terminal Terintegrasi
    window.Jupiter.init({
      displayMode: "integrated",
      integratedTargetId: "integrated-terminal",
      endpoint: "https://api.mainnet-beta.solana.com",
      template: "Pro",
      formProps: {
        initialAmount: "100000000",
      },
    });

    // Logika Connect Wallet Sederhana (Phantom)
    document.getElementById('connectWalletBtn').onclick = async () => {
      if (window.solana) {
        try {
          const res = await window.solana.connect();
          document.getElementById('connectWalletBtn').innerText = res.publicKey.toString().slice(0,6) + '...';
        } catch (err) {
          console.error(err);
        }
      } else {
        alert("Phantom not found");
      }
    };
  </script>

</body>
</html>
