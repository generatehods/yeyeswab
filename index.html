<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YEYESWAB</title>

  <style>
    body { 
      margin: 0;
      padding: 0;
      font-family: "Inter", sans-serif;
      background: #0a0f1f;
      color: #fff;
      overflow-x: hidden;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: #0d1328;
      border-bottom: 1px solid #1e2645;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-img {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }

    .brand-name {
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 1px;
    }

    .container {
      width: 100%;
      max-width: 440px;
      margin: 0 auto;
      padding: 10px;
      box-sizing: border-box;
      min-height: 100vh; /* Memastikan ada ruang untuk render */
    }

    /* Perbaikan agar tidak blank di ponsel */
    #integrated-terminal {
      width: 100%;
      min-height: 600px; 
      border-radius: 16px;
      overflow: hidden;
      background: #11172f; /* Warna placeholder saat loading */
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="logo-container">
      <img src="https://raw.githubusercontent.com/generatehods/yeyeswab/main/20251116_124325.png" alt="Logo" class="logo-img">
      <span class="brand-name">YEYESWAB</span>
    </div>
  </div>

  <div class="container">
    <!-- Kontainer Terminal -->
    <div id="integrated-terminal"></div>
  </div>

  <!-- Script Utama Jupiter -->
  <script src="https://terminal.jup.ag/main-v3.js"></script>

  <script>
    // Pastikan Anda mengganti ALAMAT_WALLET_ANDA dengan alamat asli dari Phantom
    window.Jupiter.init({
      displayMode: "integrated",
      integratedTargetId: "integrated-terminal",
      endpoint: "https://api.mainnet-beta.solana.com", 
      template: "Pro",
      
      // PENGATURAN FEE (UANG MASUK ANDA)
      platformFeeBps: 20, // 0.2% fee
      feeAccounts: new Map([
        // Ganti teks di bawah dengan alamat wallet Anda
        ["So11111111111111111111111111111111111111112", "ALAMAT_WALLET_ANDA"]
      ]),

      formProps: {
        initialInputMint: "So11111111111111111111111111111111111111112", 
        initialOutputMint: "EPjFW3F2Tzq25165QGbbVeyJBeRxMpD1rk15M81NvnYm",
      },
    });
  </script>

</body>
</html>
